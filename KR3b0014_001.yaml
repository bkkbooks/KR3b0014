body:
  text: 何博士備論卷上宋何去非撰六國論秦得所以并天下之形而天下遂至於必可并六國有可以拒秦之勢而秦遂至於不可拒者豈秦為工於斃六國耶其禍在乎六國之君自戰其所可親而忘其所可讎故也秦之為國一而已矣而關東之國六焉計秦之地居六國五之一校秦之兵當六國十之一以五一之地十一之兵而常擅其雄強以制天下之命者由其據形便之居俯扼天下之吭而蹈其膺背於足股之下故也使六國之君知夫社稷之實禍在秦而相與致誠締交戮力以擯秦即秦誠巧於攻鬭則亦何能鞭笞六國使之駢首西嚮而事秦哉又况得以一二而夷滅之也蓋其不知慮此凡所以早朝而晏罷者皆其自相屠斃之謀此秦所以得收其敝而終為所擒也蓋六國之勢莫利於為從莫害於為衡從合則安衡成則危必然之勢也方其為從於蘇秦也秦人不敢窺兵函谷關者十五年已而為衡於張儀而山東諸侯嵗被秦禍日割地以求事秦之歡卒至於地盡而國為墟六國固嘗收合從之利矣然而終敗於為衡之害者其禍在乎自戰其所可親而忘其所可讎故也所謂戰所可親忘所可讎者秦人稍蠶食六國而并夷之則關東諸侯皆與國也宜情親勢合以謀抗秦然而齊楚自恃其強有并吞燕趙韓魏之志而緩秦之禍燕趙韓魏自懲其弱有疑惡齊楚之心而脅秦之威是以衡人得而因之散敗從約秦以氣恐而勢喝之故人人震迫爭入購秦唯恐其獨後之也曽不知齊楚雖強不足以致秦之畏而其所甚忌者獨在乎韓魏也韓魏者實諸侯之西蔽也勢能限秦而使之無東秦茍有以越之我得以制其後此秦之所忌也使齊楚燕趙審夫社稷之實禍在秦而知韓魏之為蔽於我委國重而收親之固守從約併力一志以讎虎狼之秦使其一下兵於六國則六國之師悉合而從之則秦甲不敢輕越函谷而山東安矣或曰韓魏者秦之錯壤也秦兵之加韓魏也戰於百里之內其加於四國也戰於千里之外韓魏之致秦兵近在乎一日之間而其待諸侯之救乃在乎三月之外秦攻韓魏既歸而休兵則四國之乘徼者尚未及知也今徒執虛契以役韓魏則秦人固將疾攻而力蹶之是使二國速被實禍而齊楚燕趙反居齒寒之憂非至計也噫齊楚燕趙之民裹糧荷戟以應秦敵者無虛嵗也然終不能紓秦患於一日四國誠能嵗更各國之一軍命一偏將提之以合戍韓魏而佐其勢則是六國之師日萃於韓魏之郊仰關而伺秦秦誠勇者雖日辱而招之固不輕出而以腹背支敵矣夫蘇秦張儀雖其為術生於揣摩辨説之巧人皆賤之然其策畫之所出皆足以為諸侯之利害而成敗之蓋蘇秦不獲終見信於六國而張儀之志獨行於秦此六國之所以見并於秦也嗟乎使關東之國裂而為六者豈天所以終相秦乎向使關東之地合而為一以與秦人決機於韓魏之郊則勝負之勢蓋未可知使齊能因其資而遂并燕趙楚能因其資而遂并韓魏則鼎足之勢可成以其為國者六是以秦人得以間其歡而離其交終於一二而夷滅之悲夫秦論兵有攻有守善為兵者必知夫攻守之所宜故以攻則克以守則固當攻而守當守而攻均敗之道也方天下交臂相與而事秦之強也秦人出甲以攻諸侯蓋將取之也圖攻以取人之國者所謂兼敵之師也及天下攘袂相率而叛秦之亂也秦人合卒以拒諸侯蓋將卻之也圖拒以郤人之兵者所謂救敗之師也兼敵之師利於轉戰救敗之師利於固守兵之常勢也秦人據崤函之阻以臨山東自繆公以來常雄諸侯卒至於并天下而王之豈其君世賢耶亦以得乎形便之居故也二世之亂天下相與起而亡秦不數嵗而為墟以二世之不道顧秦亦足以亡然而使其知捐背叛之山東嚴兵拒關為自救之計雖以無道行之而山西千里之區猶可嵗月保也不知慮此乃空國之師以屬章邯李由之徒越關千里以搏冦而為鄉日堂堂兼敵之師亦已悖矣方陳勝之首事而天下豪傑爭西嚮而誅秦也蓋振臂一呼而帶甲者百萬舉麾一號而下城者數十又類皆山林崛起之匹夫其存亡勝敗之機取決於一戰其鋒至鋭也而章邯之徒不知固守其所以老其師乃提孤軍棄大險渡漳踰洛左馳右騖以嬰其四合之鋒卒至於敗而沛公之衆揚袖而下空函關雖二世之亂足以覆宗天下之勢足以夷秦而其亡遂至於如此之亟者用兵之罪也夫秦役其民以從事於天下之日久矣而其民被二世之毒未深其勇於公鬪樂於衛上之風聲氣俗猶在也而章邯之為兵也以攻則不足以守則有餘周文常率百萬之師傅於城下矣章邯三擊而三走之卒殺周文使其不遂縱以搏敵而坐關固守為救敗之師關東之土雖已分裂而全秦未潰也或曰七國之反漢也議者歸罪於吳楚以為不知杜成臯之口而漢將一日過成臯者數十輩遂至於敗亡今豪傑之叛秦而罪二世之越關搏戰何也嗟夫務論兵者不論其逆順之情與夫利害之勢則為兵亦踈矣夫秦有可亡之形而天下之衆亦鋭於亡秦是以豪傑之起者因民志也關東非為秦役矣漢無可叛之釁而天下之民無志於負漢則七國之起非民志矣天下皆為漢役者也以不為秦役之關東則二世安得即其地而疾戰其民以方為漢役之天下則漢安得不趨其地而疾誅其君此戰守之所以異術也昔者賈誼司馬遷皆謂使子嬰有庸主之材僅得中佐則山西之地可全而有卒取失言之譏於後世彼二子者固非愚於事機者也亦惜夫秦有可全之勢耳雖然彼徒知秦有可全之勢而不知至於子嬰而秦之事去矣雖有太公之佐其如秦何哉楚漢論王天下者其資有三有以德得之有以力并之有以智取之得之以德者三代是也并之以力者秦人是也取之以智者劉漢是也蓋以力則不若智之勝以智則不若德之全至於項羽之爭天下也其所執者為何資耶德非羽之所得言者矣其於智力之資又皆兩亡焉而後世之議乃曰項羽其亦不幸遇敵於漢而遂失之嗟夫雖微漢髙帝則羽之於天下固將失之也漢王之於智蓋踈矣以其能得真智之所在此所以王項羽之於力嘗強矣以其不知真力之所在此所以亡彼項羽以百戰百勝之氣蓋於一時手裂天下以王豪傑而宰制之自以天下莫能抗也觀其所賴以為資蓋有類乎力者矣雖然彼之所謂力者內恃其身之勇叱吒震怒足以威匹夫外恃其衆之徑搏捽決戰足以吞敵人而已至於阻河山據形便俯首東瞰臨制天下保王業之固遺後世之強所謂真力者彼固莫之或知也是以輕捐關中天險之勢燔燒屠戮以逞其暴卒舉而遺之二三降將反懷區區之故楚而甚榮其歸乃曰富貴不歸故鄉如衣繡夜行誰能知者此特淺丈夫之量安足為志天下者道哉後之數羽之罪者皆曰奪漢王之關中負信義於天下此所以亡嗟夫使項氏無意於王而徒奪漢王之關中則謂其得罪於區區之信義可也如其有意於王而奪之是得計也惟其知奪而不知有此所以亡耳古者創業造邦之君而為是之為者可勝罪哉韓信未釋垓下之甲而髙祖奪其兵不旋踵而又奪其齊然而智者不非而義者不罪者以其為天下者重而負人者輕故也是以不顧意氣之微恩而全社稷之大計也漢髙帝挾其在己之智術固無足以定天下而王之然天下卒歸之者蓋能收人之智而任之不疑也夫能因人之智而任之不疑則天下之智皆其資也此所謂真智者也又其所負者帝王之度故于其西遷也則曰吾亦欲東耳安能悒悒久居此乎此其與項羽異矣雖然使無智術之士以主其謀則天下之事亦去矣方其入關乃封秦府藏還軍霸上其畫婉矣乃怵於妄議一旦拒關無納東兵以逆其衆集之鋒幾不免於項氏之暴使遂卑而驕之當能舒徐拱揖以得項羽之歡心奠枕而王關中撫循其衆徐為後圖則天下不足定矣幸而猶獲漢中之遷因思歸之士并三秦定齊趙收信越以與項王親角者數嵗僅乃得之向使項羽據關而王驅以東出使與韓彭田黥之徒分疆錯壤以弱其勢則關東之土尚可得兼哉信乎王者之興固有所謂驅除者也鼂錯論古者持國任事有四臣焉杜患於未兆弭災於未形者賢臣也禍結而排之使安難立而戡之使平者功臣也國安矣挈而錯之危世治矣汩而屬之亂者非愚臣即姦臣也蓋姦臣之不足者忠愚臣之不足者知忠知不足而持國任事禍之府也昔者鼂錯嘗忠於漢矣而其知不足以任天下之大權也是以輕發七國之難而其身先戮於一人之言可不謂愚乎彼錯者為申韓之學鋭氣而寡恩好謀而喜功之臣也自孝景之居東宫而錯説之以人主之術數也固以知寵之矣及其即位而以天下聽之彼挾其君之以天下聽之也欲就其所謂術數之效是以輕為而不疑決發而不顧卒以憂君危國幾成劉氏之大雙而後世之士猶或知之獨子雲乃謂之愚子雲之愚錯也非以其知不足以衛身而愚之也亦以其不能杜七國未發之禍而故趣之於亂也東諸侯之勢誠強矣強而驕驕而反其理也然而束之而使無驕御之而使無反者豈固無術耶而錯之策曰削與不削皆且反也削之則反速而禍小不削則反遲而禍大是錯之術無他趣之速反而已錯之所謂禍小者以吾朝削其地而暮得其民故也安有數十年拊循之民一旦而遂不為之役也吳王所發五十萬之衆者皆其削郡之民也連七國百萬之師西向而圖危關中乃曰禍小者真愚也夫七國之王獨吳少嘗軍旅為宿姦故惡其六王皆驕夫孱稚非有髙材絶器挾智任術足以就大計者其謀又非前締而宿合之也今一旦徜徉相視而起皆吳實迫之欲并以為東帝之資耳當孝文之世濞之不朝發於死子之隙而反端著矣賈誼固嘗為之痛哭矣然而孝文一切包匿不窮其姦而以恩禮羈之是以迄孝文之世三十餘年而濞無他變也濞之反於孝景之三年而其王吳者四十三稔矣齒髮固已就衰而鄉之勇決之氣與夫驕悍之情窺覬之姦皆已沮釋矣今一旦奮然空國西嚮計不反顧者濞豈得已哉有錯之鞭趣其後以起之也昔髙帝之王濞者三郡且南靣而撫其國者四十餘年錯之任事一旦而削其二郡楚趙諸齊皆以暗隱微慝奪其封國之半彼固知其地盡而要領隨之是以出於計之無聊為一決耳向使景帝襲孝文之寬假而恩禮有加焉而錯出於主父偃之策使諸侯皆得以其封地分侯支庶以弱其勢則濞亦何事乎白首稱兵冀所非望而楚趙諸齊不安南靣之樂而甘為濞役也吳王反虜也固天人之所共棄未有不至於敗滅者然亦幸其未為曉兵者也使其誠曉兵則關東非漢有而錯之罪可勝戮哉方濞之起也其謀於宿將則曰必先取梁其謀於新將則曰必先據洛二策者皆勝策也而吳王昧於所用故敗亡隨之其曰必先取梁者梁王親景帝之母弟國大而強北距泰山西界髙陽今釋梁不下而兵遂西則漢衝其膺梁搗其吭不戰而成擒矣此宿將以先取梁為功者圖全之策也所謂以正合者也洛陽阻山河之固扼西兵之衝積武庫之械豐敖倉之粟今不疾據而徐行留攻則漢騎騰入梁楚之郊以蹙之敗可立待也此新將以先據洛為功者立竒之策也所謂以竒勝者也二策者皆勝策也雖反國之虜無所恃之亦兵家之至數也幸其當時無以雙舉而並施之以教之也是以吳王用其攻梁而不用其據洛此所以亟敗也所謂雙舉而並施者鋭師卷甲以趣洛陽重兵疾攻以覆梁都雖無能入關而山東舉矣知取梁而不知取洛則漢兵得以東下知據洛而不知取梁則梁兵得以躡後使鋭師據洛而重兵攻梁洛已據則漢兵不能即東漢兵不東則必舉梁梁舉而山東定矣幸其不出於此乃屯聚而不分以壓梁壁梁未及下而亞夫之輩馳入滎陽而壁昌邑矣求戰不得欲去不可倣徨無所之而坐成擒故曰幸其未為曉兵者也向使吳王兩用其策而又假田祿伯以偏師提之以趨武關周兵長驅遂歷陽城之北反雖不遲而禍實大矣嗚呼孰謂鼂錯非真愚者哉漢武帝論兵有所必用雖虞舜太王之不欲固當舉之有所不必用雖蚩尤秦皇之不厭固當戢之古之人君有忘戰而惡兵其敝天下皆得以陵之故其勢蹙於弱而不能振有樂戰而窮兵其敝天下皆得以乘之故其勢蹶於強而不知屈然則兵於人之國也有以用而危亦有以不用而殆矣西漢之興歷五君而至於孝武自髙帝之起匹夫誅強秦蹙暴楚已而平反亂征不服迄終其世而天下伏尸流血者二十餘年吕后惠文乘天下初定與民休息深持柔仁不拔之德其於兵也固憚言而厭用之也可謂知天下之勢矣孝景之於漢也蓋威可抗而兵可形之時也然而即位未幾卒然歡於七國之變故其志氣創艾亦姑安天下之無事未暇為天下之勢慮也然其為漢之勢亦寖以趨弱矣孝武帝以雄才大略承三世涵育之澤知夫天下之勢將就弱而不振所當濟之以威強而抗武節之時也方是時也內無姦變之臣外無強逼之國而世為漢患者獨胸奴耳夫胸奴自楚漢之起乘秦之亂復踐河南之地而其勢始強髙帝曾以三十萬之衆困於白登之圍蓋士不食者七日已解而歸不思有以復之而和親始議矣髙后被其嫚書之辱臨朝而震怒矣終之以婉辭順禮慰適其桀驁之情凡此者皆欲與民息肩姑置外之而不校也孝文之立其所以順悅輸遺者甚至飾遣宗女以固其歡蓋送車未返而胡已大舉深入候騎達于雍甘泉矣其後乍親乍絶益為冦患至於近嚴霸上棘門細柳之屯以衛京都以孝文之寬仁愼靜攝衣發憤親駕而驅之者再乃至乎輟飯搏髀而思頗牧之良將也孝景之世其所以悅奉之情與夫遺給之數又加至矣然其寇侵之暴狺然其不止也由是觀之漢之於胸奴非深懲而大治之則其為後患也可勝備哉是以孝武抗其英特之氣選徒習騎擇命將帥先發而昌誅之蓋師行十年斬刈殆盡名王貴人俘獲百數單于捧首窮遁漠北遂收兩河之地而郡屬之刷四世之侵辱遺後嗣之安強至於宣元成哀之世單于頓顙臣順謁期聽令以朝位次比內諸侯雖曰勞師匱財而功烈之被逺矣使微孝武則漢之所以世被胡患其戍役轉餉以憂纍縣官者可得而預計哉甚矣昧者之議不知求乎天下之勢強弱之任所當然者而猥曰文景為是慈儉愛民而武帝黷於兵師祈祀至與秦皇同日而非詆之豈不痛哉使孝武不溺於文成五利之姦以重耗天下攘虜之役止於衛霍之既死而不窮二師之兵則其功烈與周宣比隆矣李陵論善將將者不以其將豫敵善為將者不以其身豫敵主以其將豫敵而將不辭是制將也將以其身豫敵而主不禁是聽主也故聽主無斷而制將無權二者之失均焉漢武召陵欲為二師將輜重也而陵惡於屬人自以所將皆荆楚勇士竒才劍客願得自當一隊以步卒五千涉單于庭而無所事騎也夫所謂騎者胸奴之勝兵長技也廣澤平野奔突馳踐出沒千里非中國步兵所能敵也以胸奴之強兵騎之衆居安待佚為致敵之主而吾欲以數千之士擐甲負糧徒步深入策勞麾􅉵為赴敵之客是陵輕委其身以豫敵矣而漢武不之禁也乃甚壯之而聽其行上無統帥而旁無援師使之窮數十日之力涉數千里之地以與虜角而冀其成功陵誠勇矣雖其所以摧敗足以暴於天下卒以衆寡不敵身為降虜辱國敗家為天下笑者是漢武以陵與敵也故曰二者之失均焉法曰小敵之堅大敵之擒也陵提五千之士孤軍獨出當單于十萬之師轉鬭萬里安得不為其所擒也是以古之善戰者無幸勝而有常功計必勝而後戰是勝不可以幸得也度有功而後動是功可以常期也秦將取荆問其將李信曰度兵幾何而足信曰二十萬足矣以問王翦翦曰非六十萬不可秦君甚壯信而怯翦也遂以二十萬衆信將而行大喪其師而還秦君大怒自駕以請王翦翦曰必欲用臣顧非六十萬人不可也秦君曰謹受命翦遂將之卒破荆而滅之焉冒頓單于嫚辱吕后漢之君臣廷議欲斬其使遂舉兵擊之樊噲請曰願得十萬衆橫行胸奴中季布曰噲可斬也昔髙祖以三十萬衆困於平城噲奈何欲以十萬衆橫行胸奴也吕后大悟遂罷其議向使王翦徇秦君以將豫敵而不辭吕后聽樊噲以身豫敵而不禁則二將之禍可勝悔哉夫李廣李陵皆山西之英將也材武善戰能得士死力然輕暴易敵可以屬人難以専將世主者茍能因其材而任之使奮勵氣節霆擊鷙搏則前無堅敵而功烈可期矣漢武皆乖其所任二人者終僨蹶而不濟身辱名敗可不惜哉夫將軍衛青之大擊胸奴也以廣為前將軍青徙廣出東道少回逺乏水草廣請於上曰臣部為前將軍令臣出東道臣結髮與丐奴戰乃今一得當單于臣願居前先死單于而青隂受上旨以廣數竒無令當單于恐不得所欲廣遂出東道卒以失期自殺夫以廣之材勇得從大將軍全師之出其勝氣巳倍矣又獲居前以當單于此其志得所逞冝有以自效無復平日之不偶也奈何獨摧擯之使其枉道他出遂死于悒悒而天下皆深哀焉至若陵也又聽其以身豫敵而棄之胸奴僥幸於或勝及其以敗聞徒延首傾耳望其死敵而已無他悔惜也嗟夫漢武之於李氏不得為無負也蓋用廣者失於周而用陵者失於易其所以喪之者一也賈復中興之名將也世祖以其壯勇輕敵而敢深入不令别將逺征常自從之故復卒以勳名自終蓋壯勇輕敵者可以自從而别將逺征之所深忌也觀賈復之所以為將無以異於陵廣也而世祖不令别將逺征常以自從者是明於知復而得所以馭之之術也故卒收其效而全其軀不然則復也亦殞於敵矣嗚乎任人若世祖者幾希矣李廣論先王之政不求徇人之私情而求當天下之正義正義之立在國為法制在軍為紀律治國而緩法制者亡理軍而廢紀律者敗法制非人情之所安然吾必驅之使就者所以齊萬民也紀律非士心之所樂然吾必督之使循者所以嚴三軍也昔者李廣之為將軍其材氣超絶漢之邊將無出其右者自漢師之加胸奴廣未嘗不任其事蓋以兵居郡者四十餘年以將軍出塞者嵗相繼也而大小之戰七十餘遇以漢武之厚於賞功自衛霍之出斬虜而取侯封者數十百人廣之吏士侯者亦且數輩而廣每至於敗衄廢罪無尺寸之功以取封爵卒以失律自裁以當幕府之責當時後世之士莫不共惜其材而深哀其不偶也竊嘗究之以廣之能而遂至於此者由其治軍不用紀律此所以勳烈爵賞皆所不與而又繼之以死也夫士有死將之恩有死將之令知死恩而不知死令常至於驕知死令而不知死恩常至於怨善於將者使有以死吾之恩又有以死吾之令可百戰而百勝也雖然死恩者私也死令者職也士未有以致其私而有以致其職者可戰也未有以致其職而有以致其私者未可戰也蓋私者在士而職者在將在士者難恃在將者可必故也夫部曲行陳屯營頓舍與夫晝夜之警嚴符籍之管攝皆所謂軍之紀律雖百夫之率不可一日輒廢而緩於申嚴約束者也故以守則整而不犯以戰則肅而用命今廣之治軍欲其人人之自安利也至於部曲頓舍警嚴管攝一切弛略以便其私而専為恩所謂軍之紀律者未嘗用也故當時稱其寬緩不苛士皆愛樂而程不識乃謂士雖佚樂為之死敵然虜卒犯之無以禁也此其恩不加令而功之難必也士誠樂死之矣然其紀律之不戒者亦所以取敗也故曰厚而不能令譬如驕子不可用也昔者司馬穰苴卒然擢於閭伍之間而將齊軍一申令於莊賈而三軍之士莫不奮爭為之赴戰遂一舉而摧燕晉之師彭越起於羣盜百人之聚其所率者皆平日之等夷一旦號令斬其後期衆皆莫敢仰視遂以其兵起為侯王卒佐髙祖平一天下二人者豈獲所謂素撫循之師者哉以其得治軍之紀律能使夫三軍之士必死於令故也廣不求諸此乃從妄人之談而深自罪悔於殺已降以為禍蓋莫大於此者亦已踈矣霍去病論天之所與不可強而甚髙者材也性之所受不可習而甚明者智也以天下無可強之材可習之智則凡材智有以大過於人者皆天之所以私被之也天下之事莫神於兵天下之能莫巧於戰以其神也故溫恭信厚盛德之君子有所不能知以其巧也而桀惡欺譎不羈之小人常有以獨辨由是觀之凡材智之髙明而自得於兵之妙用者皆天之所資也昔者漢武之有事於胸奴也其世家宿將交於塞下而衛青起於賤𨽻去病奮于驕童轉戰萬里無嚮不克聲威功烈震於天下雖古之名將無以過之二人者之能豈出於素習耶亦天之所資也是以漢武欲教去病以孫吳之書乃曰顧方略何如耳不至學古兵法信哉兵之不可以法傳也昔之人無言焉而去病發之此足以知其為曉兵矣夫以兵可以無法而人可以無學也蓋兵未嘗不出於法而法未嘗能盡於兵以其必出於法故人不可以不學然法之所得而傳者其粗也以其不盡於兵故人不可以専守蓋法之無得而傳者其妙也法有定論而兵無常形一日之內一陳之間離合取舍其變無窮一移踵瞬目而兵形見矣守一定之書以應無窮之敵則勝負之數戾矣是以古之善為兵者不以法為守而以法為用常能緣法而生法與夫離法而會法順求之於古而逆施之於今仰取之以人而俯變之以己人以之死而我以之生人以之敗而我以之勝視之若拙而卒為工察之若愚而適為智運竒合變既勝而不以語人則人亦莫知其所以然者此去病之不求深學而自顧方略之如何也夫歸師勿遏曺公所以敗張繡也皇甫嵩犯之而破王國窮寇勿迫趙充國所以緩先零也唐太宗犯之而降薛仁杲百里而爭利者蹶上將孫臏所以殺龎涓也趙奢犯之而破秦軍賈詡犯之而破叛羌強而避之周亞夫所以不擊吳軍之鋭也光武犯之而破尋邑石勒犯之而敗箕淡兵少而勢分者敗黥布所以覆楚軍也曺公用之拒袁紹而斬顔良臨敵而易將者危騎劫所以喪燕師也秦君用之將白起而破趙括薛公策黥布以三計知其必棄上中而用其下賈詡策張繡以精兵追退軍而敗以敗軍擊勝卒而勝宋武先料譙縱我之出其不意然後攻彼之所不意李光弼暫出野次忽焉而歸即降思明之二將凡此者皆非法之所得膠而書之所能教也然而善者用之其巧如是此果不在乎祖其緒餘而専守也趙括之能讀父書詳矣而藺相如謂徒能讀之而不知合變也故其於論兵雖父奢無以難之然奢不以為能而逆知其必敗趙軍者以書之無益於括而妙之在我者不特非書之所不能傳而亦非吾心之能逆定於未戰之日也昔之以兵為書者無若孫武武之所可以教人者備矣其所不可者雖武亦無得而預言之而唯人之所自求也故其言曰兵家之勝不可先傳又曰竒正之變不可勝窮又曰人皆知我所勝之形而莫知吾所以制勝之形故其戰勝不復而應形於無窮善學武者因諸此而自求之乃所謂方略也去病之不求深學者亦在乎此而已嗟乎執孫吳之遺言以程人之空言求合乎其所以教而不求其所不可教乃因謂之善者亦已妄矣劉伯升論古之豪傑遭天下之變亂慨然而起皆有拯民撥亂之志其兵力威勢亦足以就功成業者已而一旦肝腦屠潰於庸夫孺子之手曾不少悟為天下笑者何也怙氣而易人矜衆而忽禍卒然而發於心意之所不及故也昔者王莽之盜漢也而劉氏宗屬誅夷廢錮救死不暇幸而存者皆孱駑不肖習為佞媚苟生而已獨伯升憤然有興復絶緒之志收結輕俠起以誅莽雖莽亦深憚之方其起也獨率舂陵子弟八千人乃誘合新市平林數千之兵以助其勢而光武之衆亦倡於宛是以斬甄阜梁丘賜而破嚴尤陳茂之師不數月而衆至十萬其勢振矣於是豪傑相與議立漢宗以從人望其意固在乎伯升也而新市平林憚其威明且樂更始之懦弛也遂定策立之伯升爭之而不得也已而伯升拔宛光武大破尋邑百萬之衆更始君臣愈不自安遂誅伯升嗟乎伯升之志固大矣而其死也愚夫且及知之而伯升不之悟也夫新市平林之將帥故羣盜耳方吾之起而藉其兵已而連卻大敵而擁衆十萬者功在我也人以其功而欲崇立之新市平林之不樂也舉而屬之駑弱之更始則三軍之權不在伯升而在乎新市平林矣權分於人而又固爭更始之立冝其不旋踵而誅矣昔者吕后之欲王諸吕也以問其相王陵陳平王陵力爭而陳平可之夫王陵之爭將欲以安漢而摧諸吕也不知陳平之可者乃所以安漢而摧諸吕也伯升所拒更始之立者王陵之爭也非所以自安矣雖然伯升之心固未嘗忘新市平林之與更始也惜其撫機而不知發而為人發之此其死而不悟也宋義之令軍中曰猛如虎狠如羊貪如狼強不可使者斬之其意固在乎項羽也羽知其意之在我也是以先發而誅之使其不先發即羽亦誅矣伯升以新市平林之為附我是以德之而未忍負之耶孰若蜀先主之於劉璋李密之於翟氏也璋舉全蜀倚先主先主遂取之以為鼎足之資人不非其負璋而與其得取蜀之機也密始臣於翟氏翟自以其才之不逮密也推而主之已而微有間言密即誅之其權遂一而兵以大振使伯升乘舉宛之威而又因世祖破尋邑之勢勒兵誓師以戮新市平林之驕將而黜更始則中興之業不在世祖矣嗟乎伯升之不忍者亦婦人之仁耳古之求集大事者常不忍於負人而終為人之所負者以其相伺之機間不容髮故也世祖之連兵決戰不及伯升而深謀至計乃甚過之蓋伯升類項羽而世祖類髙皇此所以定天下而復大業也始伯升之見殺而世祖馳詣更始逡巡引過深自咎謝不為戚傷是以更始信而任之卒至摧王郎定河北其資成矣乃徐正其位號遂以其兵西加更始而定長安使其遂形憤怏不平於伯升之禍則亦併誅而已矣漢光武論師不必衆也而效命者克士無皆勇也而致死者勝古之人有以衆而敗有以寡而勝者王尋王邑以百萬而敗於三千之光武曺公以八十萬而敗於三萬之周瑜苻堅以百萬而敗於八千之謝玄是也夫率師百萬以臨數千之軍者必勝之軍也然有時而至於敗者驕吾所以必勝而以輕敵敗也提卒數千以當百萬之衆者必敗之道也然有時而至於勝者奮吾所以必敗而以致死勝也夫兵多在敵者智將之所貪而愚將之所懼也兵寡在我者愚將之所危而智將之所安也多固可懼而我貪之恃吾有以覆其驕也少固可危而我安之恃吾有以激其奮也提數千之兵以抗大敵使之人人自致其死而忘其為數千之弱者易能也連百萬之衆以臨小敵使之人人各效其命而忘其為百萬之強者難能也何者弱則思奮而強則易懈故也弱而奮則奮者其氣也強而懈則懈者其情也於氣則易乘於情則難率因易乘之氣而激之故有以寡而勝者矣就難率之情而驅之故有以多而敗者矣是以古之善論將者必知其所以勝任之多寡苟非所勝任雖多而纍矣韓信以髙祖之所勝將者十萬耳而其自謂則雖多而益辨也是以古之善將者其用百萬如役一人分數既定形名既飾節制素明威賞素著有術以用其鋒故也趙括一用趙人四十萬束手而就長平之坑者敗於衆也王翦必用秦軍六十萬然後取勝於荆者辨於多也漢髙祖嘗一大用其軍矣劫五諸侯之兵合六十萬以攻楚也而項羽逡巡以二萬之鋭起而覆之濉水為之不流此將逾其分而韓信之所憂也曹公之於兵也巧譎竒變離合出沒其應無窮白首於兵未嘗不以少敵衆也卒喪赤壁之師而成劉備周瑜之名者驕荆州之勝恃水陸之衆而敗於懈也方尋邑百萬之衆以厭昆陽其視孤城之內外者皆几上肉也然而光武合數千之卒申之以必死之誓激之以求生之奮身先而搏之則其反視尋邑之衆者皆几上肉也是以勝雖然是役也人以其為光武之能事而莫知其所以為能事也唯諸將觀其生平見小敵怯見大敵勇也皆竊怪之而不知光武為是勇怯者乃所謂能事而皆以求勝也夫怯於小敵者其真情也勇於大敵者其權術也敵小而怯怯而戒戒而勵勝之道也敵大而勇勇而決決而奮亦勝之道也於敵之小而示之其真情是以不易勝之也於敵之大而用其權術是以不畏勝之也光武非特能以少敗衆也固又至於多而益辨也嗚呼光武之於取天下者亦何獨不出於真情之與權術歟顧人莫之測耳始伯升之結賓客喜士規以誅莽以復劉氏而世祖乃獨事田業勤稼穯而已故伯升比之髙祖兄仲而人亦以謹厚目之不意其有他也及其部勒賓客絳衣大冠而起於宛則勇決之氣又有過於伯升者焉夫光武意之所以在莽者豈一日之間邪然於莽之世而為伯升之所為者固亦危矣是以光武之獨事田業為謹厚者其權術也卒然而起絳衣大冠者其真情也故伯升首事而光武收之嗚呼英雄若世祖者為難及也何博士備論卷上
