body:
  text: 何博士備論卷下宋何去非撰魏論上昔者東漢之微豪傑並起而爭天下人各操其所爭之資蓋二袁以勢吕布以勇而曺公以智劉備孫權各挾乎智勇之微而不全者也夫兵以勢舉者勢傾則潰戰以勇合者勇竭則擒唯能應之以智則常以全強而制其二者之敝是以袁吕皆失而曺公收之劉備孫權僅獲自全於區區之一隅也方二袁之起藉其世資以撼天下紹舉四州之衆南向而逼官渡術據南陽以擾江淮遂竊大號吕布驍勇轉鬬無前而爭兖州方是之時天下之窺曺公疑不復振而人之所以爭附而樂赴者袁吕而已而曺公逡巡獨以其智起而應之奮盈萬之旅北摧袁紹而定燕冀合三縣之衆東擒吕布而收濟兖蹙袁術於淮左倣徨無歸遂以奔死而曺公智畫之出常若有餘而不少困彼之所謂勢與勇者一旦潰敗皆不勝支然後天下始服曺公之為無敵而以袁吕為不足恃也至於彼之任勢與力及夫各挾智勇之不全者亦皆知曺公之獨以智强而未易敵也故常內憚而共蹙之唯曺公自恃其智之足以鞭笞天下而服役之也故常視敵甚輕為無足虞於其東征劉備也袁紹欲躡之於其官渡之相持也孫權欲襲之於其北征烏桓也劉備欲乘之三役者皆所以致兵招寇而窺伺間隙者所起之時也然而曺公晏然不為之深憂而易計者亦失於負智輕敵之已甚是以數乘危而徼幸也雖然於勢不得不起者蓋劉備在所必征袁紹在所必拒然又其近在於徐州之與官渡使其人之謀我而我亦將有以應之未有乎顛沛也至於烏桓之役則其輕敵速冦而茍免禍敗者固無殆於此時也夫袁紹雖非曺公之敵亦所謂一時之豪傑橫大河之北奄四州之土南向而爭天下一旦摧敗卒以憂死而其二子孱駑不肖曺公折箠而驅之北走烏桓以茍嵗月之命雖未就梟戮亦可知其無能為矣方是之時中土未安幽冀新附而孫權劉備覘伺其後獨未得其機以發之耳而操方窮其兵力逺即塞北以從事於三郡烏桓為不急之役徼幸於一决嗚呼可謂至危矣使劉表少辨事機而備之謀得逞舉荆州之衆卷甲而乘許下之虛則魏之本根撥矣曺公雖還而大河之南非復魏有矣然則操之數為此舉而蔑復顧者恃其智之足以逆制於人而易之也夫官渡徐州之役在勢有不得不應雖易之可也今提兵萬里後皆冦讐而前向夷虜且甚易之而不顧者亦已大失計矣劉備之不得舉者天所以相魏耳嗟乎人唯智之難能苟惟獲乎難能之智加審處而愼用之則無所不濟今乃恃之以易人則其與不智者何異曺公所以屢蹈禍機而幸免者天實全之耳後之人無求祖乎曺公而謂天下之可易也矣魏論下言兵無若孫武用兵無若韓信曺公武雖以兵為書而不甚見於其所自用韓信不自為書曺公雖為而不見於後世然而𫝊稱二人者之學皆出於武是以能神於用而不窮竊嘗䆒之武之十三篇天下之學兵者所通誦也使其皆知所以用之則天下孰不為韓曺也以韓曺未有繼於後世則凡得武之書伏而讀之者未必皆能辨於戰也武之書韓曺之術皆在焉使武之書不𫝊則二人者之為兵固不戾乎武之所欲言者至其所以因事設奇用而不窮者雖武之言有所未能盡也驅市人白徒而置之死地惟若韓信者然後能斬陳餘遏其歸師而與之死地戰惟若曺公者然後能克張繡此武之所以寓其妙固有待乎韓曺之儔也譎衆圖勝而人莫之能知既勝而復譎以語人人亦從而信之不疑此韓信曺公無窮之變詐不獨用於敵而亦自用於其軍也蓋軍之所恃者將將之所恃者氣以屢勝之將持必勝之氣以臨三軍則三軍之士氣定而情安雖有大敵故嘗吞而勝之韓信以數萬之衆當趙之二十萬非脆敵也乃令禆將𫝊食曰破趙而後㑹食信策趙為必敗可也而曰必破而後㑹食者可豫期哉使誠有以破趙雖食而戰未為失趙之敗也然而韓信為此者以至寡而當至衆危道也故示之以必勝之氣與夫至暇之情所以寧士心而作之戰也曺公之征關中馬超韓遂之所糾合以拒公者皆劇賊也每賊一部至公輒有喜色賊皆破諸將問其故答曰關中長逺若賊各據險征之不一二年不可定也今其皆集可一舉而滅之是以喜耳袁紹追公於延津公使登壘而望之曰可五六百騎有頃復白騎積多步兵不可勝計公曰勿復白乃令解鞍縱馬待焉有頃縱兵擊之遂大破紹斬其二將夫敵多而懼者人之情也以曺公之勇而形之以懼則其下震矣故以僞喜僞安示之衆恃公之所喜與安也則畏心不生而勇亦自倍此所以勝之也故用兵之妙不獨以詐敵而又以愚吾士卒之耳目也昔者創業造邦之君蓋莫盛於漢之髙皇考其平日之智勇實無以逮其良平信越之佐然其崛起曾不纍年誅秦覆楚遂奄天下而王之曺公之資機警挾漢以令天下其行兵用師决機合變當日無與其􅓻也然卒老於軍不能平一吳蜀此其故何也議者以其持法嚴忍諸將計畫有出於己右者皆以法夷之故人舊怨無一免者此所以不濟嗟夫曺公殘刻少恩必報睚眦之怨真有之矣至若謀夫策士收攬聽任固亦不遺未嘗深負之也蓋嘗自詭以帝王之志業期有以欺眩後世然稽其才略蓋亦韓信之等夷而其遇天下之變無以異於劉項之際劉備孫權皆以人豪因時乘變保據一隅而公之諸將皆非其敵至於鞭笞中原以基大業皆公自為之而老期迫矣此其為烈與漢異也司馬仲逹論昔之君臣相擇相遇天下擾攘之日君未嘗不欲其臣之才臣未嘗不欲其君之明臣既才矣而其君嘗至於甚忌君既明矣而其臣嘗至於甚憚者何也君非有惡於臣而忌之也忌其權略之足以二於我也臣非有外於君而憚之也憚其剛忍之足以不容於我也此忌憚之所由生也雖然君固有所不忌以其得無所當忌之臣臣固有所不憚以其得無所當憚之君昔者蜀先主之與諸葛孔明苻堅之與王猛是也至於曺公之與司馬仲達則忌憚之情不得不生矣非仲達不足以致曺公之忌非曺公不足以致仲達之憚天下之士不應曺公之命者多矣而仲達一不起已將收而治之矣仲達之不起固疑其不為己容曺公之欲治固疑其不為己用此相期於其始者固已不盡君臣之誠矣則忌憚何從而不生也雖然仲達處之卒至乎曺公無所甚忌仲達無所甚憚者此所以為人豪以成乎取魏之資也人之挾數任術若荀文若者幾希矣蓋曺公之䇿士而倚之為蓍龜者也公之欲遷漢祚也於其始萌諸心而仲達啓之以中其欲於其既形於迹而文若沮之以悴其情已而文若出於直言而不能救其誅仲達卒為之腹心而遂去其憚方曺公之鞭笞天下求集大業也將師四出無一日而釋甲而仲逹獨以其身雍容治務而已未嘗一求將其兵雖公亦不以為能而求使之逮公之亡始制其兵出竒應變奄忽若神無往不殄雖曺公有所不逮焉魏文固已無忌仲達固已無憚天下始甚畏之猶公之不亡也由是觀之仲逹之以術略自將其身者可得而窺哉奈何諸葛孔明欲以其至誠大義之懷數出其兵求與之决於一戰以定魏蜀之存亡哉仲達孔明皆所謂人傑者也渭南之役人皆惜亮之死以為不見夫二人者决勝負於此舉也亮之僑軍利在速戰仲逹持重不應以老其師而求乘其敝亮以巾幗遺之欲激其應仲逹表求决戰魏君乃遣辛毗杖節制之亮以仲逹無意於戰其請於君徒示武於衆耳嗟夫謂仲逹之請戰以示武於衆者則或有之謂其有所終畏而無意於一决者亦非也雖然使辛毗不至則仲逹固將不戰也仲達之所求者克敵而已今以一辱不待其可戰之機乃悻然輕用其衆為忿憤之師安足為仲達也晉之朱伺號為善戰人或問之伺曰人不能忍而我能忍是以勝之豈以仲達而無朱伺之量耶察其所以誅曹爽者足見其能忍而待也故其策亮曰亮志大而不見機多謀而少决好兵而無權雖提卒十萬已墮吾畫中破之必矣此仲逹之志也亮之始出也仲逹語諸將曰亮若勇者當出武功依山而東若西上五丈原則諸軍無事矣昔曺公攻鄴袁尚以兵救之諸將皆以歸師勿遏當避之公曰尚從大道來且避之若循西山則成擒耳尚果循西山一戰擒之盧循反攻建業宋武策之曰賊若新亭直上且當避之回泊蔡洲則成擒耳循果泊蔡洲一戰而走之亮之趨原與袁尚之循西山盧循之泊蔡洲等耳蓋鋭氣已奪固將畏而避人不足為人之所畏避此三君者所以易而吞之也亮常嵗之出其兵不過數萬不以敗還輒以饑退今千里負糧餉師十萬坐而求戰者十旬矣仲逹提秦雍之徑卒以不應而老其師者豈徒然哉將求全於一勝也然而孔明既死蜀師引還而仲逹不窮追之者蓋不虞孔明之死其士尚飽而軍未有變蜀道阻而易伏疑其僞退以誘我也向使孔明之不死而敝於相持則仲逹之志得矣或者謂仲逹之權詭不足以當孔明之節制此腐儒守經之談不足為曉機者道也鄧艾論事物之理可以情通而不可以迹係通之以情則有以適變而應乎聖人所與之權係之以迹則無以制宜而入乎聖人所疾之固是以天下事功之成常出於權而其不濟常主於固夫以人為是而求踐之不知所以踐者於今為非以人為非而求矯之不知所以矯者於今為是是皆不求通之以今日之情而係之以既往之迹故其所以踐與矯者適足以為禍悔之資也昔衛青之擊胸奴其禆將蘇建盡亡其軍於令當斬青以不敢専誅於外囚建送之人皆多青之不擅權得所以為臣與帥之順道也皇甫嵩討賊梁州董卓副之賊平詔卓以兵屬嵩卓不受詔挾兵睥睨人皆勸嵩誅之嵩不欲其専誅於外也而以狀聞卓因遂其凶逆卒以不制夫嵩之舍卓者非出於他也蓋以衛青不戮蘇建獲恭厚之譽遂係迹而求踐之不知所以舍卓者於今為縱冦也鄧艾之伐蜀也出於萬死不顧一生之計乘危决命卒俘劉禪可謂功矣然其心氣濶略以為閫外之任當制威賞乃大専拜假至欲擅王劉禪留西不遣雖司馬文王以順諭之猶不見聽是以鍾㑹得入其間以及於誅而不悟也夫艾之專制者非出於他也蓋以皇甫嵩常要譽求全而失於董卓故蹈後悔遂係迹而求矯之不知所以矯嵩者於今為召禍也是皆不求通之以今日之情而專係乎既往之迹此所以不自知夫禍悔之集也觀艾之為將也急於智名而鋭於勇功喜邀前利而忘顧後患者也艾常以是勝敵矣而卒結禍於其身者亦以此也始鍾㑹以十萬之徑而趨劍閣姜維以摧折之帥憊於奔命雖能拒扼而終非堅敵也艾為主帥不務以全䇿縻之乃獨以其兵萬人自隂平邪徑而趨江油以襲劉禪蓋出其不意而行無人之境七百餘里鑿山險治橋閣巖谷峻絶士皆攀緣崕木投墜而下又糧運不絶而艾至於以氈自裹轉運而下嗚呼可謂危矣士皆殊死决戰僅獲破諸葛瞻之師而劉禪悸迫即時束手使禪獨忍數日之不降以待援師之集則艾為以肉齒餓虎矣艾一不濟則鍾㑹十萬之師可傳呼而潰矣艾以其身為僥幸之舉者乃求生救敗之計非所謂取亂侮亡之師而亦非大將自任之至數也是役也非艾無以取勝於速而其勝也有出於幸使其不幸而至於潰敗者亦艾致也夫竒道之兵將以掩覆於其外必有以應聽於其內然後可與勝期而功㑹也唐李訴之入蔡以取吳元濟也以其有李祐之為鄉道故也使其無應聽之主則訴亦何能乘危而僥幸也西漢中興之名將無若趙充國史稱其沈勇有大略觀其為兵期於克敵而己每以全師保勝為策未嘗茍競於一戰故其居軍無顯赫殱滅之效卒至勝敵於股掌之上安邊定寇皆其出畫而獨收其成勳他將無與焉幾於所謂無智名勇功之善者也由是觀之艾之所以不免者亦其操術之致然也吳論古之豪傑有功業之大志其才力雖足有以取濟而無謀夫策士合竒集智以更輔其不逮使無失乎事機之㑹則往往功敗業去而為徒發者皆是也昔東漢董卓之變豪傑相視而起於中州者若袁曺劉吕皆負其姦豪之資求因時乘變以濟所欲特孫堅激於忠勇投袂特起於區區之下郡奮以誅卓雖卓亦獨憚而避之惜乎三失大機而功業不就卒以輕敵遂殞其身由無謀夫策士以發其智慮之所不及故也始堅以義從之士起於長沙北至南陽衆已數萬南陽太守不時調給堅責以稽停義師按軍律而誅之人大震服南陽民籍且數百萬兵强食阜而堅不遂據之以治軍整卒命一偏將西趨武關以震三輔身扼成臯而定鞏洛迎天子而奉之仗順討逆以濟其志乃反棄去而袁術得以起而收於羈旅之中以為己資遂以驕肆此堅之一失也夫董卓之强天下畏之袁紹曺公相與㰱血而起者凡十一將皆擁據州郡衆合數萬然無敢先發以向卓者獨曺公與其偏將遇遂以敗北而堅獨以其兵趨之合戰陽人大破其軍梟其鋭將卓深震憚乃遣腹心詣堅和親咸令疏其子弟勝刺史郡守者悉表用之向使堅陽合而隂圖之差其宗親苟勝軍事者皆列疏與焉使得各據土權兵以大其勢徐四起而蹙之則其取卓易於反掌不知出此乃怒辱其使誓必誅卓使之憤懼遂殘汙洛陽劫持天子西引入關以避其鋒而窮其毒此堅之二失也夫兵以義動者其勢足以特立則何至於附人苟唯不能而有所附必其德義足以為天下之所歸往者然後從之袁術徒膺藉世資以役天下其驕豪不武非託身之主也堅巳驅卓而修復雒陽之殘壞不能阻山河之固因形勢之便以觀天下之變乃還軍魯陽聽役於術為之﨑嶇轉戰以搏黃祖卒殞其身於襄漢之間無異士伍此堅之三失也夫一舉事而三失隨之則其功業違矣孫策壯武術略過於其父又有周瑜魯肅之儔以輔其起惜乎堅之不善基也使其不得奮於中原以競天下然策一舉而收江東為鼎足之資使之不死當為魏之大患䇿之不得起於中原非其智力之不逮蓋袁紹已據河北曺公已收河南獨無隙以投之故也以劉備之間關轉戰至於白首不獲中州一塊之壤以寓其足而策乃能以敝兵千餘渡江轉鬬不數嵗而席卷江東此其過備逺矣權之勇决進取無以逮其父兄然審機察變持保江東於權有焉夫三國之形雖號鼎足而其雌雄強弱固有所在魏雖不能遂并天下蓋不失其為雄強吳蜀雖能各據其國然不免為雌弱權惟能知乎此是以內加撫循而外加備禦而己時有出師動衆以示武警敵者北不逾合淝而西不過襄陽未嘗大舉輕發以求徼幸於魏而魏人之加於我亦嘗有以拒之未嘗困折是以終權之世而江東安由是觀之則權之為謀審於諸葛武侯之用蜀矣蜀論或曰劉備之爭天下也不因中原而西入巴蜀此所以據非其地而卒以不振歟曰有之也備非特委中原而趨巴蜀也亦爭之不可得然後委之而西入耳備之西者由智窮力憊蓋晚而後出於其勢之不得已也方其豪傑並起而備已與之周旋於中原矣始得徐州而吕布奪之中得豫州而曺公奪之晚得荆州而孫權奪之備將興復劉氏之大業其志未嘗一日而忘中州也然卒無以暫寓其足委而西入者有曺操孫權之兵軋之也備之既失豫州而南依劉表也始得孔明於羈窮困蹙之際而孔明始導之以取荆取益而自為資孔明豈以中州為不足起而以區區荆益之一隅足以有為耶亦以魏制中原吳擅江左天下之未為吳魏者荆益而已顧備不取此則無所歸者故也是以一敗曺公而遂收荆州繼逐劉璋而遂取益州者孔明之略也雖然孔明之於二州也得所以取之而失所以用之至於遂亡荆州而勞用蜀民功業亦以不就良有以也夫荆州之壤界於吳蜀之間而二國之所必爭者也自其勢而言之以吳而爭荆則近而順以蜀而爭荆則逺而艱蜀之不能有荆猶魏之不能有漢中也是以先主朝得益州而孫權暮求其荆州權之求之也非以備之得蜀而無事乎荆也亦以其自蜀而爭之不若乎吳之全故也故直求之者所以示吾有以收之也蓋備一不聽而權已奪其三郡備無以爭而中分畀之以分裂不全之荆州而有孫權之窺聽其後為之鎮撫則安動復則危亮不察此而恃關羽之勇使舉其衆以北侵魏之襄陽故孫權起躡其後梟羽而盡爭其荆州此孔明失於所以用荆也然後備之所有獨岷益耳雖然地僻而固魏人不敢輕加之兵而鼎足之形遂成使備之不西而唯徘徊於中州則亦不知所以稅駕矣備之既死舉國而屬之孔明孔明有立功之志而無成功之量有合衆之仁而無用衆之智故嘗數動其衆而亟於立功功每不就而衆已疲此孔明失於所以用蜀也夫蜀之為國巖僻而固非圖天下者之所必爭然亦未嘗不忌其動以其有以窺天下之變出而乘之也雖然蜀之與魏其為大小強弱之勢蓋可見也曺公雖死而魏未有變又有司馬仲逹以制其兵孔明於此不能因備之亡深自抑弱以盈怠其心使其無意於我勵兵儲粟伺其一旦之變因河渭之上流裹糧卷甲起而乘之則莫不得志乃以區區新造之蜀倡為仁義之師強天下以思漢日引而北以求吞魏而復劉氏故常千里負糧以邀一日之戰不以敗還即以饑退此其亟於有功而亡其量以待之也善為兵者攻其所必應擊其所不備而取勝也皆出於竒孔明連嵗之出而魏人每雍容不應以老其師遂至於徒歸而又以吾小弱而向強大未嘗出於可勝之竒蜀師每出魏延常請萬兵趨他道以為竒亮每拒之而延深以憤惋孔明之出者六蓋嘗一用其竒矣聲言由斜谷而遂攻祁山以出魏人之不意一旦而降其三郡關輔大震卒以失律自喪其師竒之不可廢於兵也如此而孔明之不務此也此鋭於動衆而無其智以用之也嗚呼非湯武之師而惡夫出竒卒以喪敗其衆者可屢為哉雖然孔明不可謂其非賢者也要之㸃數無方以當司馬仲逹則非敵故也范蠡之謂勾踐曰兵甲之事種不如蠡鎮撫國家親附百姓蠡不如種范蠡自知其所長而亦不強於其所短是以能濟孔明之於蜀大夫種之任也今以種蠡之事一身而二任之此其所以不獲兩濟者也陸機論掃境內之衆而屬人以將持踈逺之身而將人之兵於君臣授受之際皆危機也善任將者不以其兵輕屬於人善為將者不以其身輕任其寄君必有以深得於臣而使之將臣必有以深得於君而為其將故武事可立而戰功可收君臣皆獲令名於天下古之人有行之者孫武之於吳王闔閭田穰苴之於齊景公周亞夫之於漢文帝是也始武以兵法干吳王也王試之以婦人武即因其所以試我者探其心而占之其意已在乎二姬之首也二姬王之所甚愛者武固知夫深宫之婦人且安王之寵豈嘗知枹鼓之約束而嚴將軍之令哉然必斬之而不釋者非有怨夫二姬者也且藉其首以探王之誠心所以信我者固與不固也吳王果不恤二姬之死而知孫武之善兵遂卒將之武亦知王之所以任我者固而安為其將故能西破強楚北威齊晉而吳以強霸齊景公以田穰苴之為將軍也受鉞之始因請其寵臣莊賈以監其軍穰苴豈真以人微權輕而有賴於賈哉其意固已在乎賈之戮也賈雖差頃刻之約可以情免也然卒不置其誅者非有忍於賈也姑借其死以探齊君之誠心而占其所以任我者篤與否也景公果賢其人而任之不疑故能大却燕晉之師而還其所侵漢文嚴三將軍之屯以備胡躬勞其軍至於細柳之亞夫雖天子之詔而屈於將軍之令方是之時細柳之士徒知亞夫之威而不知漢文之尊也豈亞夫於此悖君臣之分而為是不可犯哉亦以探孝文之誠心以占其待我者至與未至也漢文果髙其才屬於景帝以為可以重任而亞夫亦以閫外之事自専故七國之反總制其軍遂能固拒救梁之詔而平關東之變世之淺者徒見夫三人得狥衆立威之道曾不知其為術也微非特主乎狥衆立威而已也至於君臣所以相得之始固結其心不可以間離毁敗而以勳名自全者皆出乎此故也甚矣陸生之不講乎為將之術也機以亡國羈旅之身委質上國於術無所持於氣無所飬徒矜才傲物犯怒於衆司馬頴强肆不君舉犯順之師豈足為託身之主哉機以怨讎之府一朝身先羣士都督其軍而衆至數十萬漢魏以來出師之盛未嘗有也彼既失所任矣而機內無術以探其所以任我者之心外無權以濟其所以屬我者之事乃方掀然自擬管樂臨戎之始孟超以偏校干其令而辱之若遇僕虜而機不以為戮而舍之以是而將用是而戰雖提師百萬孰救其敗哉故鹿苑之潰死者如積衆毁因之遂致其誅為天下笑曾不知才不足勝其所寄智不足酬其所知一投足舉踵則顛踣隨之乃歸禍於三代之將豈不繆歟或曰機雖世將而儒者也軍旅之事非其素所長者遂喪其師此王衍房琯之徒皆以招敗也嗟乎以儒而將至乎喪師者才不足以任將故也必曰儒果不可以將將果不可用儒者非也才之所在無惡其儒也使儒而知將則世將有所不能窺也至若機者適足以殺其軀而已何足道哉晉論上神器之重有以自歸而後收之有以力取而後得之自歸而後收之者三代之上是也力取而後得之者秦漢而下是也夫歸我而收之與夫我取而得之固有間矣而其所以取之之道又有甚異者焉然則享天下者亦觀夫所取之道何如耳魏之取漢異於漢之所以取秦晉之取魏異於魏之所以取漢魏視晉以所取漢之迹晉襲魏以所取魏之權是晉之取魏者魏啓之也晉將蹈迹而取魏也是以汲汲而求執魏之權魏徒見權之去我而在晉猶昔之去漢而在魏也是以安其所取而以天下輸之乃自謂所當然者故晉於得魏之迹無以異於魏得漢而於所以取魏之道最為無名蓋有類夫王莽之盜漢也雖然晉室之禍亦魏有以遺之嗚呼豈亦天意者邪昔者秦為無道天下之民惟恐秦之不亡也是以豪傑相與起而誅秦秦亡而漢得之是漢無所負於秦也東漢自董卓之亂天下痛其禍漢之深相與建議㰱血起而誅卓者凡以為漢也卓既誅矣而曺操二袁乃始連兵相噬以爭天下而求代漢曺操先得挾漢之策以令天下終於漢不自亡而操取之是魏猶有負於漢也漢之亡也非天下亡之是操取之也雖然微曺操則漢之天下不得不亡以其有二袁之竊取之也操收天下於二袁竊取之中是漢嘗亡天下矣而操收之則魏猶為有名也故曰魏之取漢異乎漢之取秦也至於晉也則不然自司馬仲逹已韜藏禍姦於操之世操嘗悟之而不自决也以授之於丕而丕昏弱加全佑而倚任之故其於操之亡乃稍駸以立其盜權之功遂收其權而私執之所謂盜權之功者蓋東定遼東而西取孟逹南摧王凌而內誅曺爽耳非有存其既亡續其既絶之大勳若魏之於漢也蓋知夫魏之取漢其道由此也是以汲汲求蹈其迹而竊收其權更四世而固執之至於一旦取魏於偃然無事之間而天下之人亦安之於無可奈何是最為無名而有類夫王莽之盜漢也及夫晉之宗室內叛戎夷外攻至於陵夷而不可勝嘆者亦魏有以遺之魏亡公族之恩雖號加侯王而無尺土一民之奉晉人取而代之矯其無枝葉之庇於是大殖宗室假之制兵専國之權一旦八王內相屠噬至於禍結不可勝解而戎羯乘之關右秦川帝王之宅也魏武大徙戎夷種落而錯居之以扞蜀寇至於近發肘腋不可勝救以成永嘉之禍由是觀之則凡晉室之大變皆魏有以遺之嗚呼豈亦天意者耶晉論下天下之禍不患其有可覩之迹而發於近而患其無可窺之形而發於遲者有迹之可覩雖甚愚怯必加所警備而發於近者其毒常淺無形之可窺雖甚智勇亦忽於防間而發於遲者其毒常深昔者五胡之禍晉室其起非一朝之故也探其基而積之乃在於數百嵗之淹緩國更三世而歷君者數十平居常日不見其有可窺之形是以一發而莫之能支夫非無形也蓋為禍之形常隱於福為福之形常隱於禍人見其為今日之禍福而已不就其所隱而逆窺之是以於其未發皆莫覩其昭然之形此其為禍至於不可勝救之也先王之制夷狄於要荒也甚惡其猾夏而亂華未嘗不欲驅攘而擯外之周公朝諸侯於明堂夷蠻戎狄之君立於四門之外使無與夫備物盛禮之觀後世之君幸其衰敝而樂其向服也因內徙而親之其事肇於漢之孝宣漸於世祖而盛於魏武或空其國而罷徼塞之警或籍其兵而為寇敵之扞夫既去其侮而又役其力可謂世主之大欲國家之盛福矣不知積之既久而大禍之所伏一旦洶然若决防水莫之能遏晉為不幸而適當之以其平居常日不覩其昭然之形故也昔者孝宣乘武帝攘擊胸奴之威令五單于內爭始納呼韓邪之朝元帝時請罷邊備賴侯應之策以為自孝武攘之漠北奪其隂山胸奴失所蔽隱每過隂山未嘗不哭其喪之也今罷備塞則示之大利元帝雖報謝焉自是胡人亦寖而南顧漢亦甚悅其來而不之却也世祖因胸奴日逐之至遂建南庭以安納之稍內居西河美稷而其諸部因遂屯守北地朔方五原代郡雲中定襄雁門之七郡而河西之地鞠為虜區加徙叛羌錯置三輔魏武復大徙武都之氐以實關畿用禦蜀寇而胸奴五部皆居汾晉而近在肘腋矣於晉之興大率中原半為夷居元海胸奴也而居晉陽石勒羯也而居上黨姚氏羌也而居扶風苻氏氐也而居臨渭慕容鮮卑也而居昌黎種族日蕃其居處飲食皆趨華美而其逞暴貪悍樂鬬喜亂之志態則亦無時而變也是以元海一倡而并雍之胡乘時四起自長淮之北無復晉土而為戰國者幾二百年所謂發於遲而為毒深者也雖然彼之內徙而聽役也亦迫於制服之威而其情未嘗不懷土而思返固甚怨夫中國羈拘而賤侮之也是以劉猛發憤而反於晉事雖不濟而劉氏諸部未嘗一日而忘之也自魏而上其間非無明智之主足以察究微漸為子孫後世之慮然皆安其內附或樂用其力惟恐其不能鳩合而收役之雖有夫為禍之形皆不為之深思逺慮就其所伏而消厭之由晉而下自武帝之平一吳㑹遍撫天下固無藉乎夷狄之助矣茍於此時有能探其所伏之禍而逆制焉因其懷返之情加之恩意以導其行為之假建名號而廪資之使各以其種族而還之舊土彼將樂引輕去而惟恐其後也然後嚴斥障塞使有華夷內外之限後雖有警則無至乎發於肘腋之間而被不可勝言之禍矣雖然自非明智英果之主為子孫後世之慮則不能决於有為以救其未發之深禍彼晉武自平一吳㑹方以侈欲形於天下其能有及於此邪雖郭欽抗疏江統著論其言反覆切至皆恬不為省方抱虎而熟寐爾嗟乎為天下者無恃其為平日之福而忽所隱之禍也哉苻堅論上兵以義舉而以智克戰以順合而以竒勝堅之為是役也質於義順則犯考於竒智則詘悖於其所興者三玩於其所用者二此其所以敗亡而不救也所謂悖於其所興者三者不懲魏人再舉之退敗而求濟其欲於天命未改之晉一也忘其氐羌之醜類求襲正統而干授天命二也溺於鮮卑中我以禍而忘其為社稷之讎三也三者悖矣而又玩於所以用者二焉勢重不分而趨一道首尾相失無他竒變一也驕其盛强足以必勝棄其大軍易敵輕進二也此兵家之深忌也吳王劫七國百萬之師而西不用田祿伯之言乃専力於梁以至於敗者惡其權之分也祿山舉范陽數十萬之衆而南不用何千年之畫仍併兵徐行卒以不濟者惜其勢之分也雖假息反虜敗亡隨之亦昧於兵之至數也趙括之論兵工矣雖其父奢無以難之然獨憂其當敗趙軍者以其言於易也王邑恥不生縛其敵而徒過昆陽卒以大敗者以其用於易也惡其權之分則不以其兵屬人無屬人以兵是自疑之也惜其勢之分則不以其兵假人無假人以兵是自孤之也以易言之者有所不將而將必敗也以易用之者有所不戰而戰必潰也蓋衆而惡分則與寡同強而易敵則與弱同出於衆強之名而居寡弱之實者其將皆可覆而取也夫東南之所恃以為固而抗衡中原者以其有長淮大江千里之險也然而吳亡於前而陳滅於後者彼之動者義與順所出者智與竒也晉之取吳也二十萬耳而所出之道六隋之取陳也五十萬耳而所出之道八惟其所出之道多則彼之所受敵者衆是其千里之江淮固與我共之矣今堅之所率者百萬之强而前後千里其為前鋒者二十五萬而専向夀春堅嘗自恃其衆之盛謂投鞭於江足斷其流乃自向項城棄其大軍而以輕騎八千赴之是以晉人乘其未集而急擊之及其既敗而後至之兵皆死於躪踐惡在其為百萬之卒也使堅之師離為十道偕發並至分壓其境輕騎遊卒營其要害將自為敵士自為戰雖主客之勢殊攻守之形異晉誠善距而却我之二三則吾所用以取勝者蓋亦六七雖未足以亡晉而亦以勝還矣嗟夫堅之於羣氐也固所謂鐡中之錚錚者矣然至此而大悖者益信乎兵多之難辨也蓋兵有衆寡勢有分合以寡而遇衆其勢宜合以衆而遇衆其勢宜分黥布反攻楚楚為三軍以禦之而又自戰於其地布大破其一軍而二軍潰散吳漢之討公孫述以兵二萬自將而逼成都授其禆將劉尚萬人使别屯江南相距者二十里述分將攻之漢尚俱敗此兵少而分之患也然而知其妙者雖少猶將分之以兵必出於竒而竒常在於分故也項羽之二十八騎耳而分之為四㑹之為三是也至於兵大勢重而致潰敗者未嘗不在乎不分之過也法曰善用兵者譬如率然率然者常山之蛇也擊其首則尾至擊其尾則首至擊其中身則首尾俱至此言其陳之分也以陳而必分則凡兵之大勢者可知也蓋兵大勢重分之則所趨者廣足以出竒而人自為戰不分則所應者獨難以合變而身萃其敵將以其身萃敵而士不自為戰求其無敗不可得也嗟乎人常樂乎大衆之率苟唯不知其所用而用之雖至死而不悟者豈特為苻堅也哉苻堅論下荆揚雖居天下之一隅而有長淮大江之阻其俗輕易徑悍喜事爭亂自周之微為吳越楚之僣強常以其兵服役天下然其為形勢非圖天下者之所先事而必爭故後世豪傑多乘中州之擾趨而據之自其為孫氏之吳已而為晉宋齊梁陳之代興雖不能遍撫二州之境然皆以帝號自娛抗衡北方而不為下自非中州大定而其國失政雖以重師臨之鮮有得志故魏武乘舉荆之勢以數十萬之衆困於烏林魏文繼之大舉獨臨江歎息而返苻堅以秦雍百萬之強而臨淮淝一戰而潰惟其後世孱昏驕虐上下攜叛而中州之主為伐罪弔民之師則雖江淮之阻亦無足以慿負矣然而陳叔寶猶謂周師之帥嘗退敗於五至而不以為虞是以晉武之俘孫皓隋文之俘叔寶皆易於拾遺也而苻堅不懲魏人之不濟乃欲申其威於天命未改之晉此其所以敗也雖然自古夷狄之強未有遂能并集天下於一統者此姚弋仲所以重訓其子孫使必無忘於歸晉而苻融惓惓致戒於堅者凡以此也而堅昧於自度常以正朔不被四海為愧而鋭於東南之并違忠智之言收姦幸之計一舉而大喪其師冦讎因之遂亡其國不惟失天之所相亦其自取之速也始堅以豪壯之姿奮於氐羌獲王猛之材以輔成其志業遂能自三秦之強平殄燕代吞滅梁蜀九州之壤而制其七可謂盛矣然而東晉雖微衆材任事主無失德而堅乃咈衆圖之其廷臣戚屬相與力爭而不得也獨慕容垂以失國之讎欲以其禍中之求乘其弊而復燕祀乃力贊其起堅甚悅而不疑以為獨與已合遂空國大舉而僨於一戰返未及境而鮮卑叛羌共起而乘之身為俘虜遂亡其國嗚呼可不謂其非昏悖矣夫昔之智者多能中人以禍使之悅赴而不以為疑而昧者常安投其禍雖死而不悟漢世祖方集河北更始之將謝躬以兵數萬來屯於鄴光武忌之乃好謂之曰吾行擊青犢必破而尤來在山陽者勢當潰走若以君之威力擊之則成擒耳躬善其言遂以其兵去鄴而趨尤來世祖即命吳漢襲奪其城躬敗還鄴而漢殺之孫策之渡江也廬江太守劉勳新得袁術之衆而二於策策深惡之時豫章上繚宗民萬家保於江東策語勳曰上繚吾之疾也然欲取之而路非便以公之威臨之無不克也勳信之而行策遂以其輕鋭襲拔廬江而盡降劉勳之衆政慕容垂所以用之弊秦而復燕祀於既亡也夫與人為敵乃受其甘言而從其所役未有不墮其畫中者也法曰智者之慮必雜於利害𫝊曰成敗之機在於善察人之言堅於垂之言也慮其所以為利而不慮其所以為害一失其機於無以察人之言而遂至於喪敗人之於慮察也可得而忽哉嗟夫以堅之晚而昏悖自用雖景略之尚在固將不用其言而亦無以救秦之亡矣宋武帝論天下之事日至而無窮而吾有以應之莫不中理者在乎善用其機况乎爭天下之利處兩軍之交不得其機以决之則事亦隨去矣蓋機之為物不可以期待不能以巧致者也卒然而㑹迅忽眇微及其去之疾不容瞬先機而起於機為妄赴後機而發於機為失應是以御天下之事於一已而權不移制天下之變於無窮而智不詘夫機有待之百年而不至者有居之一日而數至者待之百年而無可乘之機則吾未嘗遲之而求於先發居之一日而機數至則吾未嘗厭之而怠於必應嗚呼人能知此然後可與濟天下之大業矣昔者越王句踐辱於㑹稽之棲逮其返國苦身焦思拊循其民求有以報於吳也蓋七年而民求奮於吳其臣逢同大夫種范蠡之徒止之以為未覩其可乘之機以發之也於是乎斂形匿跡以伺其隙者凡十八年一旦吳王空國北從黃池之㑹遂一舉而敗吳再舉而亡之西晉自永嘉之亂羣胡四起而分中原元帝竄身南渡收區區之江左以續宗祀而羣胡自相搏噬驟興驟滅百年之久至於苻堅并夷略盡乃空國大舉而圖江南遂及淝水百萬之敗反未及國而慕容亡燕之裔並起而乘之垂收陜東而冲亂關右苻丕坐困鄴城求我糧援既而垂以幽冀之民饉死殆盡其黨潰叛退保中山堅冲相持其勢俱憊於斯時也可謂千載一至之機也晉人有能乘燕秦相弊之餘因淝水克敵之勢選師擇將而命二軍一軍北收鄴城以舉燕代一軍西趨咸陽而定關隴據舊都之固復七廟之墜鎮撫士民以殄餘虜則武帝之業一朝可復而大耻刷矣晉人撫機而不知發乃方出師漕粟以慰其既來而尺土不獲而師以喪敗此謝安以氣怯而失機也宋武帝以英特之姿攘袂而起平靈寶於舊楚定劉毅於荆豫滅南燕於二齊克譙縱於庸蜀殄盧循於交廣西執姚泓而滅後秦蓋舉無遺策而天下憚服矣北方之冦獨關東之拓跋隴北之赫連耳方其入關魏人雖强不敢南指西顧以議其後而秦民大悅以謂百年憤辱去於一朝相與涕泣而留之以其為漢室之裔乃以長安十陵咸陽宫室以動其情使武帝因三秦悅附之民治兵搜騎而留拊之通江淮之漕下巴蜀之粟舉荆豫之師發青齊之甲以扼趙魏從事於中原則天下之勢不勞而遂一矣然其席不暇暖舉千里之秦屬之乳褓之兒引兵遽還無復顧慮大違秦民之望蓋一舉足而赫連躡踵以收關中如探物於懷間此宋武以志卑而失機也察夫宋武之心非以秦雍為當捐而趙魏為足憚也然其亟去而不顧者蓋以其艱難百戰凡所以造宋之基業者皆在乎江左故也往日南燕之役盧循乘虛而下幾失建業今之速返者畏人之議其後而為盧循之舉也此所以輕捐關中而不顧也又其起於漁樵匹夫之微﨑嶇轉戰以經略江左者凡三十年今之西師者徒欲成敗晉之資而其志慮之所在亦曰代晉而已未暇為王業萬世慮也使司馬氏卒不復見中州之定而羣胡遂為不討之讎者由再失天下之大機也嗟夫集大事者惡夫志卑而失機宋武兼之矣楊素論戰必勝攻必取者將之良能也良將之所挾亦曰智勇而已徒智而無勇則遇勇而挫徒勇而無智則遇智而蹶智足以役勇勇足以濟智然後以戰必勝以攻必取天下其孰能當之昔者楊素之於隋可謂一代之名將矣而賀若弼評之謂其特猛將耳非所謂謀將也甚哉弼之過於自負而輕於議人也隋自平陳之後素已為統帥矣其克敵斬虜功策為多既俘陳主而江湖海岱羣盜蜂起大者數萬小者數千而素專閫外之權轉戰萬里窮越嶺海無向不滅已而突厥犯塞宗室稱兵而社稷危矣素之授鉞専征其所摧陷者不可勝計遂空虜廷而清內難然素之兵未嘗小衄隋功臣無比肩者其為烈亦至矣而弼猶不以謀將處之特曰猛而已夫目之以猛而不許之以謀蓋所為徒勇而無智者矣考素之功烈如此苟其智之不逮則凡所以决機取勝者其誰之謀也自隋文平一天下所謂名將者獨韓擒虎賀若弼史萬嵗與素耳擒弼自平陳之後不獲立尺寸之效獨史萬嵗從素征討以驍勇稱而弼乃以大將自處而目是三人者皆不能盡其材亦見其不知量而務以其私言動世主也素之馭戎嚴整而喜誅每戰必求士之過失者斬之以令常至百輩而先以數百人赴敵陷陳不能而還卻者悉斬之復進以數百人期必陷陳而止是以士皆必死前無堅敵此弼之所以得目之為猛也嗟乎素非有忍於士也以為士之必死者乃所以决生必生者乃所以决死故也唐之善於兵者無若李靖其為書曰畏我者不畏敵畏敵者不畏我是以古之名將十卒而殺其三者威振於敵國殺其一者令行於三軍靖豈以卒為不足愛哉以為殺一而百奮則奮者可期於勝也縱一而百惰則惰者可期於敗也奮而克敵與夫惰而為敵所克則是殺者乃所以生之愛者乃所以害之也善為將者能審乎此則無惡乎其茍忍也雖然在素之術有足以致勝未足以為勝之工也法曰兵無選鋒曰北詩曰元戎十乘以先啓行其啓行者選鋒之謂也越王勾踐之伐吳其為士者數萬而又有君子六千人所謂君子者其選鋒也素之所使以陷陳者其選鋒之謂歟然至有不克而還不免於誅者疑其非選之特精而飬之素厚之士也又嘗觀唐太宗之將未嘗先以其身親搏戰也必以驍騎徑旅而經營於其傍或瞰臨於其髙常若無意於戰其兵既交其鬬皆力而未决也卒然率之而奮士皆殊死突貫其敵之陳而出其背凡所嬰者無不摧敗猶之二人之相搏也材鈞而力偶方相持而未决也卒然一夫起其旁而助之則夫受助者蔑不勝矣此法所謂以正合以竒勝者也使素之所用以為鋒者皆精其選而又量敵之堅脆以遣之其必足以陷敵無至乎不克而還又加之誅而常出於唐太宗之竒則如弼者亦何得而妄議矣唐論據天下之勢必有所以制天下之權蓋權待勢而立勢待權而固有是之勢而其權不足以固之則其勢日就傾弱而天下莫能安强是以人主之於權也不可一日使之去已而分於人凡物之去己者猶可收分者猶可全也至於權也一去而不可復收一分而不可復全而所據之勢隨之可不愼哉昔者唐之太宗以神武之略起定禍亂以王天下威加四海矣然所謂固天下之勢以遺諸子孫者蓋未立也於是乎籍兵於府置將於衛據關而臨制之處兵於府則將無內専之權處將於衛則兵無外擅之患然猶以為未也乃大誅四夷之侵侮者破突厥夷吐渾平髙昌滅焉耆皆俘其王親駕遼左而殘其國凡此者非以黷武也皆所以立權而固天下之勢者也武后以女主専制挾唐以令天下圖移神器天下之人莫不屏息重足從其制命彼得天下之權而逆持之然猶若此况以順守者哉明皇以英果之氣起平內難遂襲大統可謂誼主矣然狃於承平晏安之久府衛之制一切廢壞盡推其權以假邊將祿山虎視幽薊橫制千里而軍中之吏凡三千人故范陽之變一起天下大震徒驅市人以嬰其鋒使微肅宗召號忠義駕馭豪武奮不顧身與之從事則兩都不復矣雖能再造王室然其所賴以收天下者皆為方鎮矣天下之權已分於下而不全矣至於代宗僅夷殘盜乃瓜裂河朔以帥寇黨遂相為背腹世襲不禁陵夷至於大厯正元之間兩河方鎮日以強肆而當時之君畏縮摧抑常若抱虎包羞含垢媚嫵不暇以茍旦暮之無事而陵犯益至雖內設禁軍統以閹尹然亦不足以待天下之變故涇師之亂而神䇿六軍召之無一至者從奉天之幸者四百士耳及章武之興天下之為方鎮者五十縣官賦入止於東南八道而已而章武乃能振激武烈期於不赦排斥衆議而大治之於是擒劉闢於劍南執李錡於浙西縛盧從史於昭義服王承宗於鎮冀誅李師道淄青五世之襲平吳元濟淮西三世之叛可謂盛烈矣然其至於後世益以不振在內之權而閹尹執之在外之權而方鎮執之浸微浸削而遂至於亡焉蓋唐以權奪勢傾而亡天下然其亡不在乎僖昭之世而在乎天寶之載焉以其喪所以制天下之權者實兆乎此故也故其後世之君若章武者僅能自立不為之深屈而已况其非章武者乎嗟夫後之為天下者苟無意於所執之權而為人執之則視唐可知也矣郭崇韜論人謂漢髙祖以布衣之微召號豪傑起定禍亂乃瓜裂天下以王勳將韓彭英布皆連城數十南靣稱孤舉天下之籍而據其半及夫釋甲就封創血未乾皆相視誅滅蓋由髙祖封賞過制陷之驕逆其於功臣不能無負光武率義從之士平夷盜逆收還神器天下既定遂鑒髙祖之失第功行封爵為通侯大者不過數縣而不任以吏事是以元勳故將皆能自全李靖談兵之雄者也亦以謂光武得將將之道賢於髙祖逺甚嗟乎是皆不深求髙祖光武之事者也天下之事有所必然者雖聖智不能遷而避之髙皇以寬仁大度役天下之智力而集大業豈所謂隂忮暴忍而喜忌人之功者耶秦為無道天下髙材疾足爭起而競搏之皆有代秦之心也彭越黥布皆以人傑操兵特起未以其身輕屬於人也韓信挾百戰百勝之略擇主而附亦有大志故身定全齊而自王之方漢王大敗於彭城隨何不能緩頰於淮南則黥布不至及困於固陵諸侯棄約不㑹微張良之畫則彭越韓信不從方是時漢王不捐數千里之地以充三人者之欲而致其兵則楚不亡漢之待此三人者譬若飬虎飽則不動饑則噬人由是觀之封賞過制豈得已哉欲就大業於須臾之頃故也雖然大業就矣而三人者之逼天下之所共寒心也以天下之皆寒心則彼持是而安歸且髙祖亦得安枕而卧乎故疑似之釁一發而大禍集矣此其勢必至於夷滅而後定也光武痛宗社之禍收率懷漢之民投袂而起凡所攀附者多南陽故人其尤偉傑者冦鄧數人而已然較其才略徒足以供光武指顧之役非有驕桀難制若韓彭之與髙祖也天下既定封以數千之戶莫不志欲盈足惟恐持保之不獲為光武者獨何隙以誅除之哉而曰光武獨得保全勳舊之術髙祖於功臣有不容之忍此不求二主所遇之不同與夫勢理有所必至者也後唐莊宗承武皇之遺業假大義挾世讎以與梁人百戰而夷之乃有天下可謂難且勞矣然有二臣焉其為韓彭者李嗣源為冦鄧者郭崇韜也嗣源居不賞之功挾震主之威得國兵之權執之而不釋也莊宗無以奪之而稍忌其逼崇韜常有大功於國忠而可倚而嗣源之所畏者也莊宗苟能挾所倚而制所可忌則嗣源雖懷不自安而有顧憚非敢輒發也莊宗知其所忌而不知其所倚故崇韜以忠見疏讒疾日急使其營自救之計乃求將其征蜀之兵莊宗掃國中之師屬之而西崇韜雖已舉蜀捷奏才上而以讒死矣莊宗知得蜀足以資其盛強而不知崇韜之死已去嗣源之畏故鄴下之變嗣源以一旅之衆西趨洛陽如蹈無人之境其遷大器易若反掌且內有權臣窺伺間隙乃空國之師勤於逺役固已大失計矣而又去我之所倚與彼之所畏者則大禍之集可勝救哉雖得百蜀無救其失國也使崇韜之不死舉全蜀之衆因東歸之士擁繼岌檄方鎮以討君父之讎雖嗣源之強亦何以禦之蓋嗣源有韓彭之逼而不踐其禍者莊宗無髙祖之略故也崇韜有冦鄧之烈而不全其宗者莊宗無光武之明故也嗟乎人臣之禍起於操權而速禍之權莫重於制兵崇韜謀逭禍自全而方求執其兵此於抱薪救火者何異也五代論唐以陵夷蹙弱遂亡天下而真主未興五代之君遂相攘取朝獲暮失合其世祀不數十年自古有國成敗得喪未有如此之亟者然竊觀之莫不皆有所以必至之理也梁祖起於宛朐羣盜之黨已而挾聽命之唐鞭笞天下以收神器亦可謂一時之姦雄然及其衰暮而河汾李氏基業已大固當氣吞而志滅之矣借使不遂及於子禍則其後嗣有足以為莊宗之抗哉此梁之亡不待旋踵也後唐武皇假平讎之忠義發跡隂山轉戰千里奄踐汾晉及其子莊宗以兵威霸業遂夷梁室而王天下可謂壯矣然天下略定強臣驕卒遂至不制一倡而叛之不及反顧而天下遂歸於明宗至於末帝所以失天下者猶莊宗也夫以新造未安之業而有強臣驕兵以乘其失政其能自立於天下乎晉人挾震主之威乘釁而起君父契丹假其兵力以收天下易若反掌一朝嗣主孱昏肆易而戎人驕功恃強殫耗天下不足以充其要取之欲乃負反之及其所以蒙禍辱者不可勝言觀其所以自託而起者如此則晉安得而後亡哉漢祖承戎虜擾踐之餘生靈無所制命起視天下復無英雄慨然投袂而作者乃建號而應之而天下之人無所歸往亦皆俯首聽役於漢然一旦委裘而強臣巨室已不為幼子下矣故不勝其忿起而圖之僥幸於一决而周人抗命卒無以禦之而至於亡周之太祖世宗皆所謂一時之雄而世宗英特之姿有足以居天下而自立者然降年不永孺子不足當天之眷命而真人德業日隆已為天下之所歸戴則其重負安得而不釋哉由是觀之自梁以迄於周其興亡得喪世祀如此安足怪哉皆有所以必至之理也又嘗究之若唐之莊宗與夫末帝皆以雄武壯决轉鬭無前摧夷強敵卒收天下而王之非夫孱昏不肖者也然明宗之旅變於鄴下晉祖之甲倡於并門彼二主者乃低摧悸迫兒女悲涕垂頥拱手以需死期無復平日萬分之一者何也有強臣驕兵以制其命唯至乎此始悟其身之孤弱無以自救之也夫以功就天下者常有強臣以力致天下者常有驕兵臣非故強也恃勳賞之積而卒至於強兵非故驕也恃戰役之勤而卒至於驕故古者撥亂定傾之主不憂天下大計之不集而深虞大臣之或強戰士之或驕故常先事而董治之使其操制常在於我是以天下既集而國家安強舉而遺之冲人弱息而變故不作彼以亂繼亂者則不然方其圖天下之即集也日責功於將而責戰於士責功之亟則凡所以酬將者未嘗恤其或至於强責戰之切則凡所以撫士者未嘗病其或至於驕是以天下略定强臣倚驕兵而睥睨驕兵挾强臣而兾望一旦相與起而迫之反視其身倣徨孤立而大事且去則雖有平日壯决之氣持是而安歸哉此唐之莊宗末帝所以失天下者由此故也嗟乎圖天下於亟集而不計其既集之利害者終亦亟亡而已矣何博士備論卷下
