body:
  text: 右何博士備論二十八篇今缺二篇而符秦論頗有脫誤又編寫失次未得善本校之宋世士大夫憤於功之不競而喜論兵如此熙寧間徐僖蕭注熊本沈起之徒用之而輒敗天子尋以為悔元符政和開邊之議復起馴致國亡嗚呼兵豈易言哉歸震川先生題詞庚寅四月二日録于貞復堂
