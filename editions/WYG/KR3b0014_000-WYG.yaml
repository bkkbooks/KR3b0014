body:
  text: 何博士備論兵家類提要臣等謹案何博士備論二卷宋何去非撰去非字正通浦城人元豐五年以特奏名廷試除右班殿直武學敎授博士元祐四年以蘇軾薦換承奉郎五年出為徐州敎授軾又奏進所撰備論薦為館職不果行是編即軾所奏進者軾狀稱二十八篇此本僅二十六篇葢佚其二也去非本以對策論兵得官故是編皆評論古人用兵之作其文雄快踔厲風發泉涌去蘇氏父子為近蘇洵作六國論咎六國之賂秦蘇轍作六國論咎四國之不救去非所論乃兼二意其旨尤相近故軾屢稱之卷首惟載軾薦狀二篇所以誌是書之縁起也卷末有明歸有光跋深譏是論之謬且以元符政和之敗歸禍本于去非夫宋之釁由于用兵而致釁之由則起于狃習晏安廢弛武備驅不可用之兵而戰之故一試而敗再試而亡南渡以後卒積弱以至不振有光不咎宋之潰亂由士大夫不知兵而咎去非之談兵明代通儒所見如是明所由亦以弱亡歟乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀何博士備論薦狀元祐四年正月缺日翰林學士朝奉郎知制誥兼侍讀蘓軾狀奏右臣伏見左侍禁何去非本以進士六舉到省元豐五年以特奏名御廷唱名先帝見其廷對策詞理優贍長於論兵因問去非願與不願武臣官去非不敢違聖意遂除右班殿直武學教授後遷博士今已八年嘗見其所著述材力有餘識度高逺其論歴代所以廢興成敗皆出人意表有補於世去非雖喜論兵然本儒者不樂為武吏又其他文章無施不宜欲望聖慈特與換一文資仍令充太學博士以率勵學者稍振文律庶幾近古若後不如所舉臣等甘伏朝典謹録奏聞伏候勅㫖奉聖㫖特授承事郎依舊武學博士元祐五年十月十八日龍圖閣學士左朝奉郎知杭州蘓軾狀奏右臣自揣虚薄叨塵侍從常求勝已以為報國恭唯先皇帝道配周孔言成典謨雲漢之光藻飾萬物而臣子莫副其意盖嘗當食不御有才難之歎伏見承事郎徐州州學教授何去非文章議論實有過人筆勢雄健得秦漢間風力元豐五年以累舉免解答策廷中極論用兵利害先帝覽而異之特授右班殿直使教授武學不久遂為博士臣揆聖意必將長育成就以待其用豈特以一博士期去非而已哉而去非立志强毅不苟合於當時公卿故莫為一言推轂成就之者臣任翰林學士日嘗具以此奏聞乞換文資置之太學雖蒙恩換承奉郎而今者乃出為徐州教授比于博士乃似左遷非獨臣人㣲言輕不足取信亦恐朝廷不見其文章議論無以較量其人謹繕冩去非所著備論二十六篇附遞進上乞降付三省執政考覽如臣言不謬乞除一館職非獨以取羅逸才風曉士類亦以彰先帝知人之明一經題目决無虛士書之史策足為光華若後不如所舉臣甘伏朝典謹録奏聞伏候勅㫖
